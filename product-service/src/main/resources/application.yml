server:
  port: 8082

spring:
  application:
    name: product-service

  datasource:
    url: jdbc:postgresql://localhost:5432/shopscale_product
    username: postgres
    password: admin123

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  tracing:
    sampling: 
      probability: 1.0

  endpoints:
    web:
      exposure:
        include: health,info

zipkin:
  tracing:
    endpoint: http://localhost:9411/api/v2/spans